<!doctype html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    {% include head.html %}
  </head>
  <body class="bg-obsidian text-slate-100 antialiased selection:bg-indigo-500/40 selection:text-white">
    <div class="site-noise" aria-hidden="true"></div>
    <div class="fixed inset-0 -z-20 bg-[radial-gradient(circle_at_top_left,rgba(91,95,255,.22),transparent_34%),radial-gradient(circle_at_70%_20%,rgba(59,130,246,.18),transparent_28%),linear-gradient(180deg,#0B1020_0%,#070A15_100%)]"></div>
    {% include header.html %}
    <main id="main" class="relative z-10">
      {{ content }}
    </main>
    {% include footer.html %}
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script defer src="{{ site.baseurl }}/assets/js/main.js"></script>
  </body>
</html>
